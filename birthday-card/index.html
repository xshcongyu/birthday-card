<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给妈妈的生日礼物</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "STKaiti", "KaiTi", sans-serif;
      background: #f6f1ea;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 220, 225, 0.35), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(255, 240, 220, 0.30), transparent 24%),
        radial-gradient(circle at 75% 80%, rgba(255, 230, 235, 0.25), transparent 26%),
        linear-gradient(180deg, #f8f4ee 0%, #f3ede5 100%);
    }

    /* 背景柔光 */
    .ambient-light {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.28), transparent 18%);
      transition: background 0.08s linear;
    }

    /* 飘落花瓣容器 */
    .petal-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      width: 14px;
      height: 20px;
      background: linear-gradient(180deg, rgba(247, 201, 211, 0.95), rgba(236, 168, 184, 0.95));
      border-radius: 60% 60% 60% 60%;
      opacity: 0.8;
      filter: blur(0.2px);
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.35);
    }

    @keyframes fall {
      0% {
        transform: translateY(-12vh) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.85;
      }
      100% {
        transform: translateY(110vh) translateX(70px) rotate(300deg);
        opacity: 0;
      }
    }

    /* 主体区域 */
    .stage {
      position: relative;
      width: min(92vw, 1200px);
      height: min(90vh, 860px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    /* 顶部小标题 */
    .top-title {
      margin-bottom: 18px;
      font-size: 14px;
      letter-spacing: 4px;
      color: #b28e73;
      opacity: 0.9;
      user-select: none;
    }

    /* 画作卡片 */
    .art-card {
      position: relative;
      width: min(74vw, 820px);
      aspect-ratio: 4 / 5;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255,255,255,0.65);
      box-shadow:
        0 28px 70px rgba(105, 77, 58, 0.18),
        0 10px 24px rgba(105, 77, 58, 0.08);
      transform-style: preserve-3d;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .art-card:hover {
      box-shadow:
        0 34px 80px rgba(105, 77, 58, 0.22),
        0 12px 28px rgba(105, 77, 58, 0.10);
    }

    .art-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 画作表面光泽 */
    .art-shine {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(
          120deg,
          rgba(255,255,255,0.00) 20%,
          rgba(255,255,255,0.16) 40%,
          rgba(255,255,255,0.00) 60%
        );
      transform: translateX(-120%);
      animation: shineMove 6s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes shineMove {
      0%   { transform: translateX(-120%); }
      50%  { transform: translateX(120%); }
      100% { transform: translateX(120%); }
    }

    /* 底部按钮区 */
    .actions {
      margin-top: 22px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      outline: none;
      padding: 12px 22px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      color: #7a5844;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 22px rgba(117, 88, 67, 0.12);
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.88);
      box-shadow: 0 12px 28px rgba(117, 88, 67, 0.16);
    }

    /* 底部小提示 */
    .tip {
      margin-top: 14px;
      font-size: 13px;
      color: #b2947b;
      letter-spacing: 1px;
      user-select: none;
    }

    /* 祝福信弹窗 */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(88, 66, 53, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 24px;
    }

    .modal.show {
      display: flex;
    }

    .letter {
      width: min(92vw, 720px);
      max-height: 84vh;
      overflow-y: auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,246,241,0.98));
      border-radius: 24px;
      padding: 34px 32px;
      box-shadow: 0 24px 70px rgba(50, 35, 28, 0.25);
      position: relative;
      animation: popIn 0.28s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .close-btn {
      position: absolute;
      right: 16px;
      top: 14px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(239, 231, 223, 0.9);
      cursor: pointer;
      font-size: 20px;
      color: #8a6753;
    }

    .letter h2 {
      margin: 0 0 16px;
      color: #7b5844;
      font-size: 30px;
      font-weight: 600;
    }

    .letter p {
      margin: 0 0 16px;
      color: #7f6557;
      font-size: 17px;
      line-height: 2;
    }

    .signature {
      margin-top: 24px;
      text-align: right;
      color: #a17b63;
      font-size: 17px;
    }

    /* 手机兼容 */
    @media (max-width: 768px) {
      .top-title {
        font-size: 12px;
        margin-bottom: 14px;
      }

      .art-card {
        width: min(90vw, 420px);
      }

      .btn {
        font-size: 14px;
        padding: 11px 18px;
      }

      .letter {
        padding: 28px 20px;
      }

      .letter h2 {
        font-size: 24px;
      }

      .letter p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-light" id="ambientLight"></div>
  <div class="petal-layer" id="petalLayer"></div>

  <div class="stage">
    <div class="top-title">A BIRTHDAY GIFT FOR MOM</div>

    <div class="art-card" id="artCard">
      <img src="main_visual.png" alt="妈妈生日主视觉图">
      <div class="art-shine"></div>
    </div>

    <div class="actions">
      <button class="btn" id="openLetterBtn">打开一封生日信</button>
      <button class="btn" id="musicBtn">播放 / 暂停音乐</button>
      <button class="btn" id="fullscreenBtn">放大查看图片</button>
    </div>

    <div class="tip">轻轻移动鼠标，可以看到卡片的微微倾斜效果</div>
  </div>

  <!-- 弹窗 -->
  <div class="modal" id="modal">
    <div class="letter">
      <button class="close-btn" id="closeBtn">×</button>
      <h2>给妈妈的一封生日信</h2>
      <p>
        妈妈，生日快乐。<br>
        谢谢您一直以来对我的爱、包容与照顾，也谢谢您总是在我需要的时候默默支持我。
      </p>
      <p>
        很多话平时也许没有认真说出口，但我一直都记得您为我做过的点点滴滴。
        您的温柔、辛苦和付出，都让我觉得特别珍贵。
      </p>
      <p>
        希望新的一岁里，您可以多一点轻松，少一点劳累；
        多一点开心，少一点烦恼。
        愿岁月温柔以待您，愿幸福与健康常伴您左右。
      </p>
      <p>
        也希望以后我能慢慢变得更好，给您更多安心、更多陪伴、更多值得骄傲的时刻。
      </p>
      <p>
        生日快乐，妈妈。<br>
        愿您平安顺遂，温暖如常，永远被爱包围。
      </p>
      <div class="signature">爱您的孩子</div>
    </div>
  </div>

  <!-- 可选音乐 -->
  <audio id="bgm" src="bgm.mp3" loop></audio>

  <script>
    const artCard = document.getElementById("artCard");
    const ambientLight = document.getElementById("ambientLight");
    const petalLayer = document.getElementById("petalLayer");

    // 鼠标灯光 + 卡片倾斜
    document.addEventListener("mousemove", (e) => {
      const xPercent = (e.clientX / window.innerWidth) * 100;
      const yPercent = (e.clientY / window.innerHeight) * 100;
      ambientLight.style.setProperty("--mx", xPercent + "%");
      ambientLight.style.setProperty("--my", yPercent + "%");
    });

    artCard.addEventListener("mousemove", (e) => {
      const rect = artCard.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const rotateY = ((x / rect.width) - 0.5) * 8;
      const rotateX = ((0.5 - y / rect.height)) * 8;

      artCard.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
    });

    artCard.addEventListener("mouseleave", () => {
      artCard.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
    });

    // 生成花瓣
    for (let i = 0; i < 24; i++) {
      const petal = document.createElement("div");
      petal.className = "petal";
      petal.style.left = Math.random() * 100 + "vw";
      petal.style.top = (-10 - Math.random() * 30) + "vh";
      petal.style.animationDuration = (8 + Math.random() * 8) + "s";
      petal.style.animationDelay = (-Math.random() * 12) + "s";
      petal.style.transform = `rotate(${Math.random() * 180}deg)`;
      petal.style.opacity = 0.55 + Math.random() * 0.35;
      petalLayer.appendChild(petal);
    }

    // 弹窗
    const modal = document.getElementById("modal");
    const openLetterBtn = document.getElementById("openLetterBtn");
    const closeBtn = document.getElementById("closeBtn");

    openLetterBtn.addEventListener("click", () => {
      modal.classList.add("show");
    });

    closeBtn.addEventListener("click", () => {
      modal.classList.remove("show");
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.classList.remove("show");
      }
    });

    // 音乐
    const bgm = document.getElementById("bgm");
    const musicBtn = document.getElementById("musicBtn");
    let isPlaying = false;

    musicBtn.addEventListener("click", async () => {
      try {
        if (!isPlaying) {
          await bgm.play();
          isPlaying = true;
          musicBtn.textContent = "暂停音乐";
        } else {
          bgm.pause();
          isPlaying = false;
          musicBtn.textContent = "播放音乐";
        }
      } catch (err) {
        alert("如果你还没有放入 bgm.mp3，可以先忽略这个按钮。");
      }
    });

    // 全屏查看图片
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await artCard.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    });
  </script>
</body>
</html>
